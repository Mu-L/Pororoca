name: Generate artifacts

on:
  workflow_dispatch:
    inputs:
      nuget:
        required: true
        default: true
        type: boolean
      testserver_linux_x64:
        required: true
        default: false
        type: boolean
      enableDesktopUITesting:
        required: true
        default: false
        type: boolean
      linux_x64_portable:
        required: true
        default: true
        type: boolean
      linux_x64_installers:
        required: true
        default: true
        type: boolean
      osx:
        required: true
        default: true
        type: boolean
      # osx-arm64:
      #   required: true
      #   default: true
      #   type: boolean
      win_x64_installer:
        required: true
        default: true
        type: boolean
      win_x64_portable:
        required: true
        default: true
        type: boolean
      win_x86_installer:
        required: true
        default: true
        type: boolean
      win_x86_portable:
        required: true
        default: true
        type: boolean

jobs:
  nuget_linux_osx:
    if: ${{ inputs.nuget || inputs.linux_x64_portable || inputs.linux_x64_installers || inputs.osx }}
    uses: ./.github/workflows/cicd-wfw.yml
    with:
      os: ubuntu-latest
      runCD: true
      enableUITesting: ${{ inputs.enableDesktopUITesting }}
      producePororocaTestNuget: ${{ inputs.nuget }}
      produceTestServerLinuxX64: ${{ inputs.testServer_linux_x64 }}
      produceDesktopLinuxPortableX64: ${{ inputs.linux_x64_portable }}
      produceDesktopLinuxInstallersX64: ${{ inputs.linux_x64_installers }}
      produceDesktopMacOSX: ${{ inputs.osx }}

  win_installer_portable:
    if: ${{ inputs.win_x64_installer || inputs.win_x86_installer || inputs.win_x64_portable || inputs.win_x86_portable }}
    uses: ./.github/workflows/cicd-wfw.yml
    with:
      os: windows-2022 # running on Windows because we need NSIS. TODO: 'windows-2025' and later does not contain NSIS, we need to install manually
      runCD: true
      enableUITesting: ${{ inputs.enableDesktopUITesting }}
      produceDesktopWinX64Installer: ${{ inputs.win_x64_installer }}
      produceDesktopWinX86Installer: ${{ inputs.win_x86_installer }}
      produceDesktopWinX64Portable: ${{ inputs.win_x64_portable }}
      produceDesktopWinX86Portable: ${{ inputs.win_x86_portable }}
